name: SAST Security Analysis Template

on:
  workflow_call:
    inputs:
      microservice_path:
        description: "Ruta del microservicio a analizar"
        required: true
        type: string
      language:
        description: "Lenguaje principal del proyecto"
        required: false
        type: string
        default: "javascript"
      upload_results:
        description: "Subir resultados como artefactos"
        required: false
        type: boolean
        default: true
    outputs:
      security_score:
        description: "Puntaje de seguridad del análisis"
        value: ${{ jobs.sast_analysis.outputs.security_score }}
      critical_vulnerabilities:
        description: "Número de vulnerabilidades críticas encontradas"
        value: ${{ jobs.sast_analysis.outputs.critical_vulnerabilities }}

jobs:
  sast_analysis:
    name: SAST Analysis
    runs-on: ubuntu-latest
    outputs:
      security_score: ${{ steps.analyze_results.outputs.security_score }}
      critical_vulnerabilities: ${{ steps.analyze_results.outputs.critical_vulnerabilities }}
    
    permissions:
      # Requerido para acciones con GHAS
      actions: read
      contents: read
      security-events: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history for better analysis
          fetch-depth: 0

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ inputs.microservice_path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.microservice_path }}
        run: |
          npm ci --only=production

      # Inicializar CodeQL para JavaScript/Node.js con configuración por defecto
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          # Usando configuración por defecto de CodeQL - más estable y efectiva
          
      # Build automático (para lenguajes compilados)
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        
      # Análisis CodeQL
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"
          upload: true
          
      # Análisis adicional con Semgrep (Open Source)
      - name: Run Semgrep Security Analysis
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
          publishToken: ${{ secrets.SEMGREP_APP_TOKEN || '' }}
          publishDeployment: ${{ github.repository }}
          generateSarif: "1"
          
      # Upload de resultados Semgrep a GHAS
      - name: Upload Semgrep results to GitHub Advanced Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: "semgrep"

      # Análisis de resultados y métricas
      - name: Analyze Security Results
        id: analyze_results
        run: |
          echo "Analizando resultados de seguridad..."
          
          # Contar vulnerabilidades de CodeQL desde SARIF
          CRITICAL_COUNT=0
          HIGH_COUNT=0
          
          if [ -f "$GITHUB_WORKSPACE/results.sarif" ]; then
            CRITICAL_COUNT=$(jq '[.runs[].results[] | select(.level == "error" or .ruleId | contains("critical"))] | length' "$GITHUB_WORKSPACE/results.sarif" 2>/dev/null || echo "0")
            HIGH_COUNT=$(jq '[.runs[].results[] | select(.level == "warning" and (.ruleId | contains("high")))] | length' "$GITHUB_WORKSPACE/results.sarif" 2>/dev/null || echo "0")
          fi
          
          # Calcular score de seguridad (100 - (critical*10 + high*5))
          SECURITY_SCORE=$((100 - (CRITICAL_COUNT * 10 + HIGH_COUNT * 5)))
          if [ $SECURITY_SCORE -lt 0 ]; then
            SECURITY_SCORE=0
          fi
          
          echo "critical_vulnerabilities=$CRITICAL_COUNT" >> $GITHUB_OUTPUT
          echo "high_vulnerabilities=$HIGH_COUNT" >> $GITHUB_OUTPUT
          echo "security_score=$SECURITY_SCORE" >> $GITHUB_OUTPUT
          
          # Generar reporte resumido
          cat > security-summary.md << EOF
          ## 🔍 SAST Analysis Summary
          
          **Security Score:** $SECURITY_SCORE/100
          
          **Vulnerabilities Found:**
          - 🚨 Critical: $CRITICAL_COUNT
          - ⚠️ High: $HIGH_COUNT
          
          **Analysis Tools Used:**
          - ✅ GitHub CodeQL
          - ✅ Semgrep Security Rules
          
          **Recommendations:**
          - Review all critical vulnerabilities immediately
          - Fix high-priority issues before deployment
          - Consider implementing additional security controls
          EOF

      # Comentar en PR con resultados
      - name: Comment PR with Security Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security-summary.md', 'utf8');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

      # Upload de artefactos
      - name: Upload Security Analysis Results
        if: ${{ inputs.upload_results }}
        uses: actions/upload-artifact@v4
        with:
          name: sast-security-results-${{ github.run_id }}
          path: |
            security-summary.md
            semgrep.sarif
          retention-days: 30
          
      # Fallar el job si hay vulnerabilidades críticas
      - name: Security Gate
        run: |
          CRITICAL_COUNT="${{ steps.analyze_results.outputs.critical_vulnerabilities }}"
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "❌ Security Gate Failed: $CRITICAL_COUNT critical vulnerabilities found"
            echo "Please review and fix critical security issues before merging"
            exit 1
          else
            echo "✅ Security Gate Passed: No critical vulnerabilities found"
          fi