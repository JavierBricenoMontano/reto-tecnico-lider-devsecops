name: Deploy Infrastructure Template

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: string
      region:
        description: "Azure region to deploy to"
        required: true
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_CLIENT_SECRET:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true

env:
  TERRAFORM_VERSION: "1.8.1"
  TERRAGRUNT_VERSION: "0.63.6"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  validate:
    name: Validate and Plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Check Terraform Installation
        run: |
          which terraform || echo "Terraform not found!"
          terraform version || echo "Failed to get Terraform version!"

      - name: Interact with Terragrunt
        run: terragrunt --version

      - name: Terragrunt Init
        working-directory: infrastructure/environments/${{ inputs.environment }}/${{ inputs.region }}
        run: |
          terragrunt run-all init --terragrunt-non-interactive | tee terragrunt-init.log

      - name: Terragrunt Validate
        working-directory: infrastructure/environments/${{ inputs.environment }}/${{ inputs.region }}
        run: |
          terragrunt run-all validate --terragrunt-non-interactive | tee terragrunt-validate.log

      - name: Terragrunt Plan
        working-directory: infrastructure/environments/${{ inputs.environment }}/${{ inputs.region }}
        run: |
          terragrunt run-all plan --terragrunt-non-interactive | tee terragrunt-plan.log

      - name: Save Logs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-logs
          path: |
            infrastructure/environments/${{ inputs.environment }}/${{ inputs.region }}/terragrunt-init.log
            infrastructure/environments/${{ inputs.environment }}/${{ inputs.region }}/terragrunt-validate.log
            infrastructure/environments/${{ inputs.environment }}/${{ inputs.region }}/terragrunt-plan.log
          retention-days: 1

  apply:
    name: Apply
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Check Terraform Installation
        run: |
          which terraform || echo "Terraform not found!"
          terraform version || echo "Failed to get Terraform version!"

      - name: Interact with Terragrunt
        run: terragrunt --version

      - name: Terragrunt Init
        working-directory: infrastructure/environments/${{ inputs.environment }}/${{ inputs.region }}
        run: |
          terragrunt run-all init -reconfigure --terragrunt-non-interactive | tee terragrunt-init.log

      - name: Terragrunt Apply
        working-directory: infrastructure/environments/${{ inputs.environment }}/${{ inputs.region }}
        run: |
          terragrunt run-all apply --terragrunt-non-interactive | tee terragrunt-apply.log

      - name: Save Logs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-logs
          path: |
            infrastructure/environments/${{ inputs.environment }}/${{ inputs.region }}/terragrunt-init.log
            infrastructure/environments/${{ inputs.environment }}/${{ inputs.region }}/terragrunt-apply.log
          retention-days: 1
