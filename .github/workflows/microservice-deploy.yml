name: Build and Deploy to AKS

on:
  push:
    branches:
      - development12
    paths:
      - "mibanco-microservice/**"
  workflow_dispatch:

env:
  ACR_NAME: mibancodevacr
  AKS_CLUSTER_NAME: aks-mibanco-dev
  AKS_RESOURCE_GROUP: rg-mibanco-devops-challenge-dev-eastus
  NAMESPACE: mibanco-app-ns

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and Push
    outputs:
      image_tag: ${{ steps.set_image_tag.outputs.IMAGE_TAG }}
    steps:
      - uses: actions/checkout@v3
      # Configurar Docker para usar Azure Container Registry
      - name: "Docker login to ACR"
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME_DEV }}
          password: ${{ secrets.ACR_PASSWORD_DEV }}

      # Definir el tag de la imagen con el SHA del commit
      - name: Set image tag
        id: set_image_tag
        run: |
          IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Construir la imagen
      - name: Build
        working-directory: mibanco-microservice
        run: |
          docker build . -t ${{ env.ACR_NAME }}.azurecr.io/mibanco-app:${{ env.IMAGE_TAG }}

      - name: Instalar Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Escanear imagen con Trivy
        working-directory: mibanco-microservice
        run: |
          trivy image --exit-code 1 --severity CRITICAL ${{ env.ACR_NAME }}.azurecr.io/mibanco-app:${{ env.IMAGE_TAG }}

      # Publicar la imagen en ACR
      - name: Push image to ACR
        run: |
          docker push ${{ env.ACR_NAME }}.azurecr.io/mibanco-app:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    needs: build
    steps:
      - uses: actions/checkout@v3
      # Autenticarse con Azure
      - name: "Az CLI login"
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Configuración de Kubernetes
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      # Asegurarse de que el namespace existe
      - name: Create namespace if not exists
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      # Reemplazar variables en los manifiestos
      - name: Update kubernetes manifests
        working-directory: mibanco-microservice
        run: |
          sed -i "s|\${ACR_NAME}|${{ env.ACR_NAME }}|g" kubernetes/deployment.yml
          sed -i "s|\${IMAGE_TAG}|${{ needs.build.outputs.image_tag }}|g" kubernetes/deployment.yml

      # Aplicar manifiestos de Kubernetes
      - name: Deploy to AKS
        working-directory: mibanco-microservice
        run: |
          kubectl apply -f kubernetes/deployment.yml -n ${{ env.NAMESPACE }}
          kubectl apply -f kubernetes/service.yml -n ${{ env.NAMESPACE }}
          kubectl apply -f kubernetes/hpa.yml -n ${{ env.NAMESPACE }}
          kubectl apply -f kubernetes/ingress.yml -n ${{ env.NAMESPACE }}

      # Esperar hasta que el despliegue esté listo
      - name: Wait for Deployment
        run: |
          kubectl rollout status deployment/mibanco-app -n ${{ env.NAMESPACE }}

      # Verificar el despliegue
      - name: Verify deployment
        run: |
          echo "Verificando pods:"
          kubectl get pods -n ${{ env.NAMESPACE }}

          echo "Verificando servicio:"
          kubectl get svc -n ${{ env.NAMESPACE }}

          echo "Verificando ingress:"
          kubectl get ingress -n ${{ env.NAMESPACE }}

          echo "Verificando HPA:"
          kubectl get hpa -n ${{ env.NAMESPACE }}
