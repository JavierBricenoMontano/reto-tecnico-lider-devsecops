name: Deploy Infrastructure

on:
  push:
    branches:
      - development
    paths:
      - "infrastructure/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "dev"
      region:
        description: "Azure region to deploy to"
        required: true
        default: "eastus"

env:
  TERRAFORM_VERSION: "1.8.1"
  TERRAGRUNT_VERSION: "0.63.6"
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  REGION: ${{ github.event.inputs.region || 'eastus' }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terragrunt Validate
        working-directory: infrastructure/environments/${{ env.ENVIRONMENT }}/${{ env.REGION }}
        run: |
          terragrunt run-all validate

  plan:
    name: Plan
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terragrunt Plan
        working-directory: infrastructure/environments/${{ env.ENVIRONMENT }}/${{ env.REGION }}
        run: |
          terragrunt run-all plan -out=tfplan

      - name: Save Plan
        uses: actions/upload-artifact@v2
        with:
          name: terraform-plan
          path: infrastructure/environments/${{ env.ENVIRONMENT }}/${{ env.REGION }}/**/tfplan
          retention-days: 1

  apply:
    name: Apply
    needs: plan
    if: github.ref == 'refs/heads/development' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: development # Requiere aprobación manual en GitHub
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install Terragrunt
        run: |
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v${{ env.TERRAGRUNT_VERSION }}/terragrunt_linux_amd64
          chmod +x terragrunt_linux_amd64
          sudo mv terragrunt_linux_amd64 /usr/local/bin/terragrunt

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure CLI script
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az account show
            az group list

      - name: Download Plan
        uses: actions/download-artifact@v2
        with:
          name: terraform-plan
          path: infrastructure/environments/${{ env.ENVIRONMENT }}/${{ env.REGION }}

      - name: Terragrunt Apply
        working-directory: infrastructure/environments/${{ env.ENVIRONMENT }}/${{ env.REGION }}
        run: |
          terragrunt run-all apply --terragrunt-non-interactive

      - name: Export Outputs
        working-directory: infrastructure/environments/${{ env.ENVIRONMENT }}/${{ env.REGION }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/outputs

          # Obtener outputs de ACR
          cd acr
          terragrunt output -json > $GITHUB_WORKSPACE/outputs/acr.json

          # Obtener outputs de AKS
          cd ../aks
          terragrunt output -json > $GITHUB_WORKSPACE/outputs/aks.json

          # Obtener outputs de Resource Group
          cd ../resource-group
          terragrunt output -json > $GITHUB_WORKSPACE/outputs/resource_group.json

      - name: Save Outputs
        uses: actions/upload-artifact@v2
        with:
          name: terraform-outputs
          path: outputs
          retention-days: 7
