# Configuración de Dependency Review para SCA
# Este archivo controla el comportamiento del análisis de dependencias

# Nivel de severidad mínimo que causa fallo del workflow
fail_on_severity: 'high'

# Scopes de dependencias a analizar
fail_on_scopes:
  - 'runtime'      # Dependencias de producción
  - 'development'  # Dependencias de desarrollo

# Licencias permitidas (solo licencias permisivas y compatibles)
allow_licenses:
  # Licencias muy permisivas
  - 'MIT'
  - 'Apache-2.0'
  - 'BSD-2-Clause'
  - 'BSD-3-Clause'
  - 'ISC'
  - 'Unlicense'
  - 'CC0-1.0'
  
  # Licencias permisivas adicionales
  - 'LGPL-2.1'
  - 'LGPL-3.0'
  - 'MPL-2.0'

# Configuración de vulnerabilidades específicas
# Se pueden permitir CVEs específicos si son aceptados después de revisión
allow_ghsas: []
  # Ejemplo de formato:
  # - 'GHSA-abcd-1234-5679'  # Permitir este GHSA específico después de revisión

# Configuración de reportes
comment_summary_in_pr: true