apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mibanco-ingress
  namespace: mibanco
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mibanco-service
                port:
                  number: 80
