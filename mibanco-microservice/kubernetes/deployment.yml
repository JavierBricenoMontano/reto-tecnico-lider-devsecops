apiVersion: apps/v1
kind: Deployment
metadata:
  name: mibanco-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mibanco-app
  template:
    metadata:
      labels:
        app: mibanco-app
    spec:
      containers:
        - name: mibanco-app
          image: ${ACR_NAME}.azurecr.io/mibanco-app:${IMAGE_TAG}
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
